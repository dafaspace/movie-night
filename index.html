<style>

  body { background: #0d0d1a; color: #f0f0f0; font-family: 'DM Sans', sans-serif; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 4px; }

  .header h1 span.gold { color: #F5C518; }

<body>
<div class="app">
  <div class="header">
    <h1><span class="gold">MOVIE</span> NIGHT</h1>
    <p>TMDB · AI Picks · Watch History</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('search')">🔍 Search</button>
    <button class="tab-btn" onclick="switchTab('recs')">✨ Picks</button>
    <button class="tab-btn" onclick="switchTab('history')">📋 My List</button>
  </div>

  <div class="content">
    <!-- SEARCH -->
    <div id="tab-search">
      <div class="search-row">
        <input id="search-input" type="text" placeholder="Movie or series title..." onkeydown="if(event.key==='Enter')doSearch()">
        <button class="btn-gold" onclick="doSearch()">SEARCH</button>
      </div>
      <div id="search-results"></div>
    </div>

    <!-- PICKS -->
    <div id="tab-recs" style="display:none">
      <div style="margin-bottom:12px">
        <div class="search-row">
          <input id="rec-input" type="text" placeholder="Mood, genre, or anything...">
          <button class="btn-gold" id="rec-btn" onclick="loadRecs()">FIND</button>
          <button onclick="surpriseMe()" style="padding:11px 14px;border-radius:10px;background:#7c3aed;border:none;color:#fff;font-family:'Bebas Neue',cursive;font-size:15px;letter-spacing:1px;cursor:pointer;flex-shrink:0;transition:opacity .15s;white-space:nowrap" onmouseover="this.style.opacity=.85" onmouseout="this.style.opacity=1">✨ SURPRISE ME</button>
        </div>
        <div id="rec-history-hint" style="color:#444;font-size:11px;margin-top:5px"></div>
      </div>
      <div id="rec-results"></div>
    </div>

    <!-- MY LIST -->
    <div id="tab-history" style="display:none">
      <div class="filter-row">
        <button class="filter-pill active" id="pill-all" onclick="setFilter('all')">All</button>
        <button class="filter-pill" id="pill-plan" onclick="setFilter('plan')">🕐 Want to Watch</button>
        <button class="filter-pill" id="pill-watched" onclick="setFilter('watched')">✓ Watched</button>
      </div>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div id="detail-overlay" class="overlay" style="display:none" onclick="closeDetail()">
  <div class="modal" onclick="event.stopPropagation()">
    <div id="detail-content"></div>
  </div>
</div>

<!-- Add Modal -->
<div id="add-overlay" class="overlay" style="display:none" onclick="closeAdd()">
  <div style="padding:20px;width:100%;display:flex;justify-content:center" onclick="event.stopPropagation()">
    <div class="add-modal">
      <div style="font-family:'Bebas Neue',cursive;color:#F5C518;font-size:12px;letter-spacing:2px;margin-bottom:3px" id="add-modal-label">ADD TO HISTORY</div>
      <div id="add-movie-title" style="font-family:'Bebas Neue',cursive;font-size:19px;margin-bottom:14px;line-height:1.2"></div>
      <div id="add-stars-section">
        <div class="add-label">Your Rating</div>
        <div class="stars-row" id="stars-row">
          <span class="star" onclick="setStar(1)">★</span>
          <span class="star" onclick="setStar(2)">★</span>
          <span class="star" onclick="setStar(3)">★</span>
          <span class="star" onclick="setStar(4)">★</span>
          <span class="star" onclick="setStar(5)">★</span>
        </div>
        <div class="add-label">Notes</div>
        <textarea id="add-note" placeholder="What did you think?"></textarea>
      </div>
      <div style="display:flex;gap:9px">
        <button class="btn-close" onclick="closeAdd()">Cancel</button>
        <button class="btn-add-watched" id="add-confirm-btn" onclick="confirmAdd()">SAVE</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const TMDB_TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJkMzZlNzE1NWJmMGM3YTEwZWU3ZDZhMzQ3NTRjZGIwZiIsIm5iZiI6MTc3NTU0MzgzNi45MDIwMDAyLCJzdWIiOiI2OWQ0YTYxY2UzMmYxZGQ5NjVmOGE0NTYiLCJzY29wZXMiOlsiYXBpX3JlYWQiXSwidmVyc2lvbiI6MX0.LQNp1b9CpMzuO2J5XknQ4osUtiqoG9VRsZpGg0oAY4U";
const TMDB_BASE = "https://api.themoviedb.org/3";
const TMDB_IMG  = "https://image.tmdb.org/t/p/w300";
const ANTHROPIC_KEY = "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";

const SB_URL = "https://ubjafkxdybiwgcupassu.supabase.co";
const SB_KEY = "sb_publishable_Ep9kQs8XcfgUoK2ACiIo8w_CLDGkZJf";

// ── Quotes ────────────────────────────────────────────────────────────────────
const QUOTES = [

// ── Supabase ──────────────────────────────────────────────────────────────────
async function sbFetch(path, opts = {}) {
  const res = await fetch(SB_URL + "/rest/v1/" + path, {
    ...opts,
    headers: {
      "apikey": SB_KEY,
      "Authorization": "Bearer " + SB_KEY,
      "Content-Type": "application/json",
      "Prefer": opts.prefer || "",
      ...(opts.headers || {})
    }
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function loadHistoryFromDB() {
  const rows = await sbFetch("watchlist?order=created_at.desc");
  return rows.map(r => ({
    id: r.id,
    tmdbID: r.imdb_id,
    title: r.title,
    year: r.year,
    poster: r.poster,
    stars: r.stars || 0,
    comment: r.comment || "",
    status: r.status || "watched",
    mediaType: r.media_type || "movie",
    date: new Date(r.created_at).toLocaleDateString("en-GB")
  }));
}

async function saveEntryToDB(entry) {
  await sbFetch("watchlist", {
    method: "POST",
    prefer: "return=representation",
    body: JSON.stringify({
      imdb_id: entry.tmdbID,
      title: entry.title,
      year: entry.year,
      poster: entry.poster,
      stars: entry.stars,
      comment: entry.comment,
      status: entry.status,
      media_type: entry.mediaType || "movie"
    })
  });
}

async function deleteEntryFromDB(id) {
  await sbFetch(`watchlist?id=eq.${id}`, { method: "DELETE" });
}

async function updateEntryInDB(id, fields) {
  await sbFetch(`watchlist?id=eq.${id}`, {
    method: "PATCH",
    prefer: "return=representation",
    body: JSON.stringify(fields)
  });
}

// ── TMDB ──────────────────────────────────────────────────────────────────────
async function tmdbFetch(path) {
  const res = await fetch(TMDB_BASE + path, {
    headers: { "Authorization": "Bearer " + TMDB_TOKEN, "accept": "application/json" }
  });
  return res.json();
}

// Detect if query contains Cyrillic
function hasCyrillic(str) { return /[а-яёА-ЯЁ]/.test(str); }

async function translateQuery(q) {
  if (!ANTHROPIC_KEY) return q;
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": ANTHROPIC_KEY, "anthropic-version": "2023-06-01" },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001", max_tokens: 100,
        messages: [{ role: "user", content: `Translate this movie/show title to English for searching. Reply with ONLY the English title, nothing else: "${q}"` }]
      })
    });
    const d = await res.json();
    return d.content?.[0]?.text?.trim() || q;
  } catch { return q; }
}

async function tmdbSearch(q) {
  // Search in both English and original language simultaneously
  const [enRes, multiRes] = await Promise.all([
    tmdbFetch(`/search/multi?query=${encodeURIComponent(q)}&include_adult=false&language=en-US`),
    tmdbFetch(`/search/multi?query=${encodeURIComponent(q)}&include_adult=false`)
  ]);
  // Merge and deduplicate
  const all = [...(enRes.results||[]), ...(multiRes.results||[])];
  const seen = new Set();
  return all.filter(r => {
    if ((r.media_type !== "movie" && r.media_type !== "tv") || seen.has(r.id)) return false;
    seen.add(r.id);
    return true;
  }).slice(0, 10).map(r => ({
    id: r.id,
    tmdbID: String(r.id),
    type: r.media_type,
    Title: r.title || r.name,
    Year: (r.release_date || r.first_air_date || "").slice(0,4),
    Poster: r.poster_path ? TMDB_IMG + r.poster_path : "",
    Rating: r.vote_average ? r.vote_average.toFixed(1) : null,
    Genre: ""
  }));
}

async function tmdbDetail(id, type) {
  type = type || "movie";
  // If type is wrong, TMDB returns success=false or empty title — auto-detect
  let detail = await tmdbFetch(`/${type}/${id}?language=en-US`);
  if (!detail.title && !detail.name) {
    const alt = type === "movie" ? "tv" : "movie";
    const altDetail = await tmdbFetch(`/${alt}/${id}?language=en-US`);
    if (altDetail.title || altDetail.name) { detail = altDetail; type = alt; }
  }
  const credits = await tmdbFetch(`/${type}/${id}/credits?language=en-US`);
  const director = credits.crew?.filter(c => c.job === "Director").map(c => c.name).join(", ") || "";
  const cast = credits.cast?.slice(0,6).map(c => c.name).join(", ") || "";
  const writers = credits.crew?.filter(c => ["Screenplay","Writer","Story"].includes(c.job)).slice(0,3).map(c => c.name).join(", ") || "";
  return {
    tmdbID: String(id),
    type,
    Title: detail.title || detail.name || "",
    OriginalTitle: detail.original_title || detail.original_name || "",
    Year: (detail.release_date || detail.first_air_date || "").slice(0,4),
    Poster: detail.poster_path ? TMDB_IMG + detail.poster_path : "",
    Runtime: detail.runtime ? `${detail.runtime} min` : (detail.episode_run_time?.[0] ? `${detail.episode_run_time[0]} min/ep` : ""),
    Rating: detail.vote_average ? detail.vote_average.toFixed(1) : null,
    Plot: detail.overview || "",
    Genre: (detail.genres||[]).map(g=>g.name).join(", "),
    Director: director,
    Cast: cast,
    Writers: writers,
    Country: (detail.production_countries||[]).map(c=>c.name).join(", "),
    Language: (detail.spoken_languages||[]).map(l=>l.english_name).join(", "),
    Tagline: detail.tagline || "",
    Status: detail.status || "",
    Seasons: detail.number_of_seasons || null,
    Episodes: detail.number_of_episodes || null,
    Networks: (detail.networks||[]).map(n=>n.name).join(", "),
  };
}

// Parse query: extract year if present, return { title, year }
function parseQuery(raw) {
  const yearOnly = raw.match(/^(\d{4})$/);
  if (yearOnly) return { title: "", year: yearOnly[1] };
  const withYear = raw.match(/^(.+?)\s+(\d{4})$/);
  if (withYear) return { title: withYear[1].trim(), year: withYear[2] };
  return { title: raw, year: null };
}

async function tmdbSearchWithYear(title, year) {
  // If year-only, search popular movies/shows of that year
  if (!title && year) {
    const [movies, tv] = await Promise.all([
      tmdbFetch(`/discover/movie?sort_by=popularity.desc&primary_release_year=${year}&language=en-US`),
      tmdbFetch(`/discover/tv?sort_by=popularity.desc&first_air_date_year=${year}&language=en-US`)
    ]);
    const all = [
      ...(movies.results||[]).map(r => ({ ...r, media_type: "movie" })),
      ...(tv.results||[]).map(r => ({ ...r, media_type: "tv" }))
    ].sort((a,b) => b.popularity - a.popularity).slice(0, 12);
    return all.map(r => ({
      id: r.id, tmdbID: String(r.id), type: r.media_type,
      Title: r.title || r.name,
      Year: (r.release_date || r.first_air_date || "").slice(0,4),
      Poster: r.poster_path ? TMDB_IMG + r.poster_path : "",
      Rating: r.vote_average ? r.vote_average.toFixed(1) : null,
      Genre: ""
    }));
  }
  // Title + optional year: search normally then filter by year
  let results = await tmdbSearch(title);
  if (year) results = results.filter(r => r.Year === year);
  // If year filter left nothing, fall back to unfiltered (year may be slightly off)
  if (year && !results.length) results = await tmdbSearch(title);
  return results;
}

async function doSearch() {
  const raw = document.getElementById("search-input").value.trim();
  if (!raw) return;
  const el = document.getElementById("search-results");
  el.innerHTML = loadingHTML(randQuote(), false);
  try {
    const { title, year } = parseQuery(raw);
    let q = title;
    if (hasCyrillic(q) && ANTHROPIC_KEY) q = await translateQuery(q);

    let results = await tmdbSearchWithYear(q, year);

    // Also search original Cyrillic if translated
    if (hasCyrillic(title) && q !== title) {
      const ruResults = await tmdbSearchWithYear(title, year);
      const seen = new Set(results.map(r => r.tmdbID));
      ruResults.forEach(r => { if (!seen.has(r.tmdbID)) results.push(r); });
    }

    if (!results.length) {
      el.innerHTML = `<div class="empty"><div class="icon">🤷</div><div class="title">NO RESULTS</div><div class="sub">Try just the title without the year</div></div>`;
      return;
    }
    el.innerHTML = `<div class="card-list">${results.map(m => movieCardHTML(m)).join("")}</div>`;
  } catch(e) {
    el.innerHTML = `<div class="empty"><div class="title">CONNECTION ERROR</div><div class="sub">${e.message}</div></div>`;
  }
}

function openAdd(movie, status) {

  currentStars = 0;
  document.getElementById("add-movie-title").textContent = `${movie.Title} (${movie.Year})`;

function closeAdd() { document.getElementById("add-overlay").style.display = "none"; }
function setStar(n) { currentStars = n; renderStars(n); }
function renderStars(n) {
  document.querySelectorAll(".star").forEach((s, i) => s.classList.toggle("on", i < n));
}

async function confirmAdd() {
  const m = currentAddMovie;
  const btn = document.getElementById("add-confirm-btn");
  btn.textContent = "SAVING..."; btn.disabled = true;

  const tmdbID = String(m.tmdbID || m.id || "");
  const existing = watchHistory.find(h => h.tmdbID === tmdbID);

  try {
    if (existing) {
      // Update existing entry instead of creating a duplicate
      const fields = { status: currentAddStatus };
      if (currentAddStatus === "watched") {
        fields.stars = currentStars;
        fields.comment = document.getElementById("add-note").value;
      }
      await updateEntryInDB(existing.id, fields);
    } else {
      await saveEntryToDB({
        tmdbID,
        title: m.Title || "",
        year: m.Year || "",
        poster: m.Poster || "",
        stars: currentAddStatus === "plan" ? 0 : currentStars,
        comment: currentAddStatus === "plan" ? "" : document.getElementById("add-note").value,
        status: currentAddStatus,
        mediaType: m.type || m.mediaType || "movie"
      });
    }
    watchHistory = await loadHistoryFromDB();
  } catch(e) {
    alert("Could not save: " + e.message);
    btn.textContent = "SAVE"; btn.disabled = false;
    return;
  }

  closeAdd();
  closeDetail();
  if (document.querySelector(".tab-btn:nth-child(3)").classList.contains("active")) renderHistory();
  btn.textContent = "SAVE"; btn.disabled = false;
}

      .join("\n");

      .map(m => m.title).join(", ");

    const prompt = `You are a film expert. Pick ONE perfect film or show for this person to watch tonight.

${watched ? `Their watch history:\n${watched}` : "No watch history yet."}
${planned ? `\nOn their watchlist: ${planned}` : ""}

Choose something they haven't seen. Be bold — don't just pick the obvious choice.

Write 2-3 sentences explaining exactly why THIS film is perfect for them tonight.

Reply ONLY with JSON (no other text):
{"title":"...","year":"...","type":"movie or tv","why":"2-3 sentence explanation"}`;

    const res = await fetch("https://api.anthropic.com/v1/messages", {

async function loadRecs() {
  const q = document.getElementById("rec-input").value.trim();

  const el = document.getElementById("rec-results");
  btn.disabled = true; btn.textContent = "THINKING...";
  el.innerHTML = loadingHTML(randQuote(), true);

    let suggestions = [];

    if (ANTHROPIC_KEY) {
      const watched = watchHistory.filter(h=>h.status==="watched").slice(-12)
        .map(m => `${m.title} (${m.year})${m.stars ? " "+m.stars+"★" : ""}${m.comment ? ` — "${m.comment}"` : ""}`)
        .join("\n");
      const planned = watchHistory.filter(h=>h.status==="plan").slice(-6)
        .map(m => m.title).join(", ");

      const prompt = `You are a film expert helping pick what to watch tonight.

${watched ? `Watch history:\n${watched}` : "No watch history yet."}
${planned ? `\nOn their watchlist: ${planned}` : ""}

User request: "${q || "Surprise me with something great"}"

Based on their taste and request, suggest exactly 5 films or TV shows.
- Interpret the request broadly: if they say "something funny", find comedy films; "cozy evening" means light feel-good content; "mind-bending" means psychological thrillers etc.

Reply ONLY with a JSON array, no other text:

      const res = await fetch("https://api.anthropic.com/v1/messages", {

  const rated = watched.filter(h => h.stars > 0);

  el.innerHTML = `

          <div class="hist-poster">${item.poster&&item.poster!=="N/A" ? `<img src="${item.poster}" alt="" onerror="this.parentNode.innerHTML='🎬'">` : "🎬"}</div>
          <div style="flex:1;min-width:0">

              <div>
                <div class="hist-title">${item.title}</div>
                <div class="hist-meta">${item.year} · ${item.date}</div>
              </div>
              <button class="hist-del" onclick="event.stopPropagation();deleteItem(${item.id})">×</button>
            </div>
            ${item.status === "watched"
              ? `<div style="display:flex;gap:2px;margin-top:3px">${starsHTML(item.stars)}</div>`
              : `<span class="status-tag plan">🕐 Want to watch</span>`}
            ${item.comment ? `<div class="hist-note">"${item.comment}"</div>` : ""}
          </div>
        </div>`).join("")}
    </div>`;
}

async function deleteItem(id) {
  try {
    await deleteEntryFromDB(id);
    watchHistory = watchHistory.filter(h => h.id !== id);
    renderHistory();
  } catch(e) { alert("Could not delete: " + e.message); }
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById("search-results").innerHTML = `
  <div class="empty"><div class="icon">🎬</div>
  <div class="title">FIND YOUR NEXT FILM</div>
  <div class="sub">Type a title and press Search</div></div>`;
document.getElementById("rec-results").innerHTML = `
  <div class="empty"><div class="icon">✨</div>
  <div class="title">GET PERSONALISED PICKS</div>
  <div class="sub">Enter a prompt or leave blank and hit Find</div></div>`;

(async () => {
  try { watchHistory = await loadHistoryFromDB(); } catch(e) { console.warn("History load failed:", e); }
})();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").catch(err => console.warn("SW:", err));
}
</script>
</body>
</html>
