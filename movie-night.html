<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Movie Night</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Movie Night">
<meta name="theme-color" content="#0d0d1a">
<link rel="apple-touch-icon" href="icon.png">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d1a; color: #f0f0f0; font-family: 'DM Sans', sans-serif; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 4px; }

  .app { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }

  .header { padding: 22px 18px 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .header h1 { font-family: 'Bebas Neue', cursive; font-size: 32px; letter-spacing: 2px; line-height: 1; }
  .header h1 span.gold { color: #F5C518; }
  .header p { color: #555; font-size: 11px; margin-top: 3px; }

  .tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .tab-btn { flex: 1; padding: 11px 0; background: none; border: none; border-bottom: 2px solid transparent;
    color: #555; cursor: pointer; font-size: 12px; font-family: 'DM Sans', sans-serif;
    font-weight: 400; margin-bottom: -1px; transition: all .2s; }
  .tab-btn.active { color: #F5C518; border-bottom-color: #F5C518; font-weight: 600; }

  .content { padding: 14px 14px 0; }

  .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .search-row input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; color: #f0f0f0; font-size: 15px; padding: 11px 14px;
    font-family: 'DM Sans', sans-serif; outline: none; }
  .search-row input:focus { border-color: rgba(245,197,24,0.4); }
  .btn-gold { padding: 11px 16px; border-radius: 10px; background: #F5C518; border: none;
    color: #111; font-family: 'Bebas Neue', cursive; font-size: 15px; letter-spacing: 1px;
    cursor: pointer; flex-shrink: 0; transition: opacity .15s; }
  .btn-gold:hover { opacity: 0.85; }
  .btn-gold:disabled { background: #2a2a3a; color: #555; cursor: not-allowed; opacity: 1; }

  .empty { text-align: center; color: #444; padding: 50px 0; }
  .empty .icon { font-size: 36px; margin-bottom: 8px; }
  .empty .title { font-family: 'Bebas Neue', cursive; font-size: 16px; letter-spacing: 1px; color: #555; }
  .empty .sub { font-size: 12px; margin-top: 4px; }

  .card-list { display: flex; flex-direction: column; gap: 9px; }
  .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 11px; display: flex; gap: 11px;
    cursor: pointer; transition: background .15s; }
  .card:hover { background: rgba(255,255,255,0.07); }

  .poster { width: 56px; height: 80px; flex-shrink: 0; border-radius: 8px; overflow: hidden;
    background: #1a1a2e; display: flex; align-items: center; justify-content: center; }
  .poster img { width: 100%; height: 100%; object-fit: cover; }

  .card-body { flex: 1; min-width: 0; }
  .card-title { font-family: 'Bebas Neue', cursive; font-size: 16px; letter-spacing: .5px; line-height: 1.2; }
  .card-meta { color: #666; font-size: 11px; margin-top: 2px; }
  .card-actions { display: flex; align-items: center; gap: 8px; margin-top: 7px; }
  .btn-add { padding: 3px 10px; border-radius: 6px; background: #F5C518; border: none;
    color: #111; font-size: 11px; font-weight: 700; cursor: pointer;
    font-family: 'Bebas Neue', cursive; letter-spacing: 1px; }
  .hint { color: #444; font-size: 11px; }
  .watched-badge { color: #F5C518; font-size: 11px; }

  .why-strip { padding: 6px 12px; background: rgba(245,197,24,0.04);
    border: 1px solid rgba(255,255,255,0.08); border-top: none;
    border-radius: 0 0 12px 12px; color: #998; font-size: 12px; font-style: italic; }

  /* Loading */
  .loading-box { margin: 8px 0 20px; padding: 24px 20px;
    background: rgba(245,197,24,0.04); border: 1px solid rgba(245,197,24,0.15);
    border-radius: 14px; text-align: center; }
  .dots { display: flex; justify-content: center; gap: 7px; margin-bottom: 16px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #F5C518; }
  .dot:nth-child(1) { animation: bounce 1.2s ease-in-out 0s infinite; }
  .dot:nth-child(2) { animation: bounce 1.2s ease-in-out .18s infinite; }
  .dot:nth-child(3) { animation: bounce 1.2s ease-in-out .36s infinite; }
  .dot:nth-child(4) { animation: bounce 1.2s ease-in-out .54s infinite; }
  .dot:nth-child(5) { animation: bounce 1.2s ease-in-out .72s infinite; }
  .progress-track { height: 2px; background: rgba(245,197,24,0.15); border-radius: 2px;
    margin-bottom: 16px; overflow: hidden; }
  .progress-bar { height: 100%; width: 40%; background: #F5C518; border-radius: 2px;
    animation: progressSlide 1.8s ease-in-out infinite; }
  .loading-quote { color: #ddd; font-style: italic; font-size: 14px; line-height: 1.5; }
  .loading-source { color: #555; font-size: 11px; margin-top: 5px; letter-spacing: .5px; }
  .loading-sub { color: #555; font-size: 11px; margin-top: 10px; }

  .skeleton-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 11px; display: flex; gap: 11px; }
  .skel-poster { width: 56px; height: 80px; border-radius: 8px;
    background: rgba(255,255,255,0.06); animation: shimmer 1.5s ease-in-out infinite; }
  .skel-body { flex: 1; padding-top: 4px; }
  .skel-line { border-radius: 4px; background: rgba(255,255,255,0.06);
    animation: shimmer 1.5s ease-in-out infinite; margin-bottom: 8px; }

  /* Detail modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300;
    display: flex; align-items: flex-end; justify-content: center; }
  .modal { background: #13131f; border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px 20px 0 0; width: 100%; max-width: 480px;
    max-height: 88vh; overflow-y: auto; padding: 20px 18px 32px; }
  .modal-top { display: flex; gap: 14px; margin-bottom: 16px; }
  .modal-poster { width: 90px; height: 134px; flex-shrink: 0; border-radius: 8px;
    overflow: hidden; background: #1a1a2e; display: flex; align-items: center; justify-content: center; }
  .modal-poster img { width: 100%; height: 100%; object-fit: cover; }
  .modal-title { font-family: 'Bebas Neue', cursive; font-size: 22px;
    letter-spacing: .5px; line-height: 1.15; color: #fff; }
  .chips { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
  .chip { padding: 2px 8px; border-radius: 20px; background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.08); font-size: 11px; color: #aaa; }
  .plot { color: #ccc; font-size: 13px; line-height: 1.6; margin-bottom: 16px;
    padding: 12px; background: rgba(255,255,255,0.03); border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08); }
  .crew-label { color: #555; font-size: 11px; font-weight: 600; margin-bottom: 3px; }
  .crew-val { color: #ddd; font-size: 13px; margin-bottom: 10px; }
  .awards-box { margin-bottom: 14px; padding: 8px 12px;
    background: rgba(245,197,24,0.05); border-radius: 8px;
    border: 1px solid rgba(245,197,24,0.15); color: #F5C518; font-size: 12px; }
  .modal-actions { display: flex; gap: 9px; margin-top: 18px; }
  .btn-close { flex: 1; padding: 10px; border-radius: 9px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    color: #777; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; }
  .btn-add-history { flex: 2; padding: 10px; border-radius: 9px; background: #F5C518;
    border: none; color: #111; font-family: 'Bebas Neue', cursive;
    font-size: 15px; letter-spacing: 1px; cursor: pointer; }
  .watched-confirm { flex: 2; padding: 10px; text-align: center; color: #F5C518; font-size: 13px; font-weight: 600; }

  /* Add modal */
  .add-modal { background: #13131f; border: 1px solid rgba(245,197,24,.2);
    border-radius: 16px; padding: 22px; width: 100%; max-width: 380px; }
  .add-label { color: #555; font-size: 11px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
  .stars-row { display: flex; gap: 4px; margin-bottom: 14px; }
  .star { font-size: 26px; cursor: pointer; color: #333; transition: color .15s; user-select: none; }
  .star.on { color: #F5C518; }
  textarea { width: 100%; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
    color: #ddd; font-size: 13px; padding: 9px 11px;
    resize: vertical; min-height: 65px; font-family: 'DM Sans', sans-serif;
    outline: none; margin-bottom: 18px; }

  .history-header { display: flex; justify-content: space-between;
    margin-bottom: 10px; color: #555; font-size: 11px; }
  .hist-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 11px; display: flex; gap: 11px;
    cursor: pointer; transition: background .15s; }
  .hist-card:hover { background: rgba(255,255,255,0.07); }
  .hist-poster { width: 44px; height: 64px; flex-shrink: 0; border-radius: 6px;
    overflow: hidden; background: #1a1a2e; display: flex; align-items: center; justify-content: center; font-size:18px; }
  .hist-poster img { width: 100%; height: 100%; object-fit: cover; }
  .hist-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .hist-title { font-family: 'Bebas Neue', cursive; font-size: 15px; letter-spacing: .5px; }
  .hist-meta { color: #555; font-size: 10px; }
  .hist-del { background: none; border: none; color: #444; cursor: pointer; font-size: 18px; line-height: 1; padding: 0 0 0 8px; }
  .hist-del:hover { color: #888; }
  .hist-note { color: #999; font-size: 12px; margin-top: 3px; font-style: italic; }

  @keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:.3} 40%{transform:scale(1);opacity:1} }
  @keyframes shimmer { 0%,100%{opacity:.5} 50%{opacity:1} }
  @keyframes progressSlide { 0%{transform:translateX(-200%)} 100%{transform:translateX(350%)} }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1><span class="gold">MOVIE</span> NIGHT</h1>
    <p>IMDb Search · AI Picks · Watch History</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('search')">🔍 Search</button>
    <button class="tab-btn" onclick="switchTab('recs')">✨ Picks</button>
    <button class="tab-btn" onclick="switchTab('history')">📋 History</button>
  </div>

  <div class="content">
    <!-- SEARCH -->
    <div id="tab-search">
      <div class="search-row">
        <input id="search-input" type="text" placeholder="Movie title..." onkeydown="if(event.key==='Enter')doSearch()">
        <button class="btn-gold" onclick="doSearch()">SEARCH</button>
      </div>
      <div id="search-results"></div>
    </div>

    <!-- PICKS -->
    <div id="tab-recs" style="display:none">
      <div style="margin-bottom:12px">
        <div style="color:#555;font-size:11px;margin-bottom:5px;font-weight:600;letter-spacing:.5px">OPTIONAL PROMPT</div>
        <div class="search-row">
          <input id="rec-input" type="text" placeholder="Genre, mood, a film you love..." onkeydown="if(event.key==='Enter')loadRecs()">
          <button class="btn-gold" id="rec-btn" onclick="loadRecs()">FIND</button>
        </div>
        <div id="rec-history-hint" style="color:#444;font-size:11px;margin-top:5px"></div>
      </div>
      <div id="rec-results"></div>
    </div>

    <!-- HISTORY -->
    <div id="tab-history" style="display:none">
      <div id="history-list"></div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div id="detail-overlay" class="overlay" style="display:none" onclick="closeDetail()">
  <div class="modal" onclick="event.stopPropagation()">
    <div id="detail-content"></div>
  </div>
</div>

<!-- Add Modal -->
<div id="add-overlay" class="overlay" style="display:none" onclick="closeAdd()">
  <div style="padding:20px;width:100%;display:flex;justify-content:center" onclick="event.stopPropagation()">
    <div class="add-modal">
      <div style="font-family:'Bebas Neue',cursive;color:#F5C518;font-size:12px;letter-spacing:2px;margin-bottom:3px">ADD TO HISTORY</div>
      <div id="add-movie-title" style="font-family:'Bebas Neue',cursive;font-size:19px;margin-bottom:14px;line-height:1.2"></div>
      <div class="add-label">Your Rating</div>
      <div class="stars-row" id="stars-row">
        <span class="star" onclick="setStar(1)">★</span>
        <span class="star" onclick="setStar(2)">★</span>
        <span class="star" onclick="setStar(3)">★</span>
        <span class="star" onclick="setStar(4)">★</span>
        <span class="star" onclick="setStar(5)">★</span>
      </div>
      <div class="add-label">Notes</div>
      <textarea id="add-note" placeholder="What did you think?"></textarea>
      <div style="display:flex;gap:9px">
        <button class="btn-close" onclick="closeAdd()">Cancel</button>
        <button class="btn-add-history" onclick="confirmAdd()">SAVE</button>
      </div>
    </div>
  </div>
</div>

<script>
const OMDB_KEY = "b9bd48a6";
const ANTHROPIC_KEY = ""; // Paste your Anthropic API key here for AI picks

// Verified quotes with accurate attribution
const QUOTES = [
  { text: "I'll be back.", source: "The Terminator (1984)" },
  { text: "You can't handle the truth!", source: "A Few Good Men (1992)" },
  { text: "May the Force be with you.", source: "Star Wars (1977)" },
  { text: "There's no place like home.", source: "The Wizard of Oz (1939)" },
  { text: "To infinity and beyond!", source: "Toy Story (1995)" },
  { text: "Why so serious?", source: "The Dark Knight (2008)" },
  { text: "You talking to me?", source: "Taxi Driver (1976)" },
  { text: "I see dead people.", source: "The Sixth Sense (1999)" },
  { text: "Houston, we have a problem.", source: "Apollo 13 (1995)" },
  { text: "My precious.", source: "The Lord of the Rings: The Two Towers (2002)" },
  { text: "Life is like a box of chocolates.", source: "Forrest Gump (1994)" },
  { text: "Just keep swimming.", source: "Finding Nemo (2003)" },
  { text: "I am your father.", source: "The Empire Strikes Back (1980)" },
  { text: "Here's looking at you, kid.", source: "Casablanca (1942)" },
  { text: "Get busy living, or get busy dying.", source: "The Shawshank Redemption (1994)" },
];

function randQuote() {
  return QUOTES[Math.floor(Math.random() * QUOTES.length)];
}

let watchHistory = JSON.parse(localStorage.getItem("mn_history") || "[]");
let currentAddMovie = null;
let currentStars = 0;

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(name) {
  ["search","recs","history"].forEach(t => {
    document.getElementById("tab-"+t).style.display = t === name ? "block" : "none";
  });
  document.querySelectorAll(".tab-btn").forEach((btn, i) => {
    btn.classList.toggle("active", ["search","recs","history"][i] === name);
  });
  if (name === "history") renderHistory();
  if (name === "recs") {
    const hint = document.getElementById("rec-history-hint");
    hint.textContent = watchHistory.length > 0
      ? `Based on ${watchHistory.length} film${watchHistory.length > 1 ? "s" : ""} in your history`
      : "Add films to your history for personalised picks";
  }
}

// ── OMDb ──────────────────────────────────────────────────────────────────────
async function omdbSearch(q) {
  const r = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_KEY}&s=${encodeURIComponent(q)}&type=movie`);
  const d = await r.json();
  return d.Search || [];
}

async function omdbDetail(id) {
  const r = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_KEY}&i=${id}&plot=full`);
  return r.json();
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function posterHTML(src, title, w=56, h=80) {
  const s = `width:${w}px;height:${h}px;flex-shrink:0;border-radius:8px;overflow:hidden;background:#1a1a2e;display:flex;align-items:center;justify-content:center`;
  if (src && src !== "N/A") return `<div style="${s}"><img src="${src}" alt="${title}" style="width:100%;height:100%;object-fit:cover"></div>`;
  return `<div style="${s}"><span style="font-size:22px">🎬</span></div>`;
}

function starsHTML(n, size=13) {
  return [1,2,3,4,5].map(s => `<span style="font-size:${size}px;color:${s<=n?'#F5C518':'#333'}">★</span>`).join("");
}

function loadingHTML(quote, withSkeletons) {
  const skels = withSkeletons ? Array(5).fill(0).map((_,i) => `
    <div class="skeleton-card" style="margin-top:9px">
      <div class="skel-poster"></div>
      <div class="skel-body">
        <div class="skel-line" style="height:16px;width:60%;animation-delay:${i*.1}s"></div>
        <div class="skel-line" style="height:11px;width:35%;animation-delay:${i*.1+.1}s"></div>
      </div>
    </div>`).join("") : "";
  return `
    <div class="loading-box">
      <div class="dots">${[0,1,2,3,4].map(i=>`<div class="dot"></div>`).join("")}</div>
      <div class="progress-track"><div class="progress-bar"></div></div>
      <div class="loading-quote">"${quote.text}"</div>
      <div class="loading-source">— ${quote.source}</div>
      <div class="loading-sub">Searching...</div>
    </div>${skels}`;
}

function movieCardHTML(m, why) {
  const inHist = watchHistory.some(h => h.imdbID === m.imdbID);
  const rating = m.imdbRating && m.imdbRating !== "N/A" ? ` · ★ ${m.imdbRating}` : "";
  const genre = m.Genre ? ` · ${m.Genre.split(",")[0]}` : "";
  const safeM = encodeURIComponent(JSON.stringify(m));
  const actionBtn = inHist
    ? `<span class="watched-badge">✓ Watched</span>`
    : `<button class="btn-add" onclick="event.stopPropagation();openAddEncoded('${safeM}')">+ WATCHED</button>`;
  const hint = m.imdbID ? `<span class="hint">tap for details →</span>` : "";
  const topRadius = why ? "12px 12px 0 0" : "12px";
  return `
    <div>
      <div class="card" style="border-radius:${topRadius}" onclick="${m.imdbID ? `openDetail('${m.imdbID}')` : ''}">
        ${posterHTML(m.Poster, m.Title)}
        <div class="card-body">
          <div class="card-title">${m.Title}</div>
          <div class="card-meta">${m.Year}${rating}${genre}</div>
          <div class="card-actions">${actionBtn}${hint}</div>
        </div>
      </div>
      ${why ? `<div class="why-strip">💡 ${why}</div>` : ""}
    </div>`;
}

// ── Search ────────────────────────────────────────────────────────────────────
async function doSearch() {
  const q = document.getElementById("search-input").value.trim();
  if (!q) return;
  const el = document.getElementById("search-results");
  el.innerHTML = loadingHTML(randQuote(), false);
  try {
    const results = await omdbSearch(q);
    if (!results.length) {
      el.innerHTML = `<div class="empty"><div class="icon">🤷</div><div class="title">NO RESULTS</div><div class="sub">Try a different title or spelling</div></div>`;
      return;
    }
    el.innerHTML = `<div class="card-list">${results.map(m => movieCardHTML(m)).join("")}</div>`;
  } catch(e) {
    el.innerHTML = `<div class="empty"><div class="title">CONNECTION ERROR</div><div class="sub">${e.message}</div></div>`;
  }
}

// ── Detail ────────────────────────────────────────────────────────────────────
async function openDetail(id) {
  document.getElementById("detail-overlay").style.display = "flex";
  document.getElementById("detail-content").innerHTML = loadingHTML(randQuote(), false);
  const d = await omdbDetail(id);
  const inHist = watchHistory.some(h => h.imdbID === id);
  const chips = (d.Genre||"").split(", ").map(g => `<span class="chip">${g}</span>`).join("");
  const crew = [
    d.Director && d.Director!=="N/A" ? `<div class="crew-label">🎬 Director</div><div class="crew-val">${d.Director}</div>` : "",
    d.Writer && d.Writer!=="N/A" ? `<div class="crew-label">✍️ Screenplay</div><div class="crew-val">${d.Writer}</div>` : "",
    d.Actors && d.Actors!=="N/A" ? `<div class="crew-label">🌟 Cast</div><div class="crew-val">${d.Actors}</div>` : "",
  ].join("");
  const addBtn = inHist
    ? `<div class="watched-confirm">✓ Already in history</div>`
    : `<button class="btn-add-history" onclick="openAddFromDetail()">+ ADD TO HISTORY</button>`;

  document.getElementById("detail-content").innerHTML = `
    <div class="modal-top">
      ${posterHTML(d.Poster, d.Title, 90, 134)}
      <div style="flex:1;min-width:0">
        <div class="modal-title">${d.Title||""}</div>
        <div style="color:#666;font-size:12px;margin-top:3px">${d.Year||""} · ${d.Runtime||""} · ${d.Rated||""}</div>
        ${d.imdbRating&&d.imdbRating!=="N/A" ? `<div style="color:#F5C518;font-weight:700;font-size:15px;margin-top:4px">★ ${d.imdbRating} <span style="color:#555;font-weight:400;font-size:12px">/ 10 IMDb</span></div>` : ""}
        ${d.Metascore&&d.Metascore!=="N/A" ? `<div style="font-size:12px;color:#888;margin-top:2px">Metascore: ${d.Metascore}</div>` : ""}
        <div class="chips">${chips}</div>
      </div>
    </div>
    ${d.Plot&&d.Plot!=="N/A" ? `<div class="plot">${d.Plot}</div>` : ""}
    ${crew}
    ${d.Awards&&d.Awards!=="N/A" ? `<div class="awards-box">🏆 ${d.Awards}</div>` : ""}
    ${d.Country&&d.Country!=="N/A" ? `<div style="margin-bottom:18px"><div class="crew-label">COUNTRY / LANGUAGE</div><div class="crew-val">${d.Country} · ${d.Language||""}</div></div>` : ""}
    <div class="modal-actions">
      <button class="btn-close" onclick="closeDetail()">Close</button>
      ${addBtn}
    </div>`;
  window._detailMovie = d;
}

function openAddFromDetail() { openAdd(window._detailMovie); }
function closeDetail() { document.getElementById("detail-overlay").style.display = "none"; }

// ── Add to history ────────────────────────────────────────────────────────────
function openAddEncoded(encoded) {
  openAdd(JSON.parse(decodeURIComponent(encoded)));
}

function openAdd(movie) {
  currentAddMovie = movie;
  currentStars = 0;
  document.getElementById("add-movie-title").textContent = `${movie.Title} (${movie.Year})`;
  document.getElementById("add-note").value = "";
  renderStars(0);
  document.getElementById("add-overlay").style.display = "flex";
}

function closeAdd() { document.getElementById("add-overlay").style.display = "none"; }
function setStar(n) { currentStars = n; renderStars(n); }
function renderStars(n) {
  document.querySelectorAll(".star").forEach((s, i) => s.classList.toggle("on", i < n));
}

async function confirmAdd() {
  const m = currentAddMovie;
  let detail = m;
  if (m.imdbID) { try { detail = await omdbDetail(m.imdbID); } catch(e) {} }
  const entry = {
    id: Date.now(),
    imdbID: m.imdbID || "",
    title: detail.Title || m.Title || "",
    year: detail.Year || m.Year || "",
    poster: detail.Poster || m.Poster || "",
    stars: currentStars,
    comment: document.getElementById("add-note").value,
    date: new Date().toLocaleDateString("en-GB")
  };
  watchHistory.unshift(entry);
  localStorage.setItem("mn_history", JSON.stringify(watchHistory));
  closeAdd();
  closeDetail();
  if (document.querySelector(".tab-btn:nth-child(3)").classList.contains("active")) renderHistory();
}

// ── Picks ─────────────────────────────────────────────────────────────────────
async function loadRecs() {
  const q = document.getElementById("rec-input").value.trim();
  const btn = document.getElementById("rec-btn");
  const el = document.getElementById("rec-results");
  btn.disabled = true;
  btn.textContent = "SEARCHING...";
  el.innerHTML = loadingHTML(randQuote(), true);

  try {
    let suggestions = [];

    if (ANTHROPIC_KEY) {
      const watched = watchHistory.slice(-8).map(m => `${m.title} (${m.year}) ${m.stars}★`).join(", ");
      const prompt = q
        ? `Suggest 5 movies similar to: "${q}". User watched: ${watched||"nothing yet"}. Reply ONLY with a JSON array: [{"title":"...","year":"...","why":"one sentence"}]`
        : `Based on this watch history: ${watched||"no history yet"}. Suggest 5 great movies to watch next. Reply ONLY with a JSON array: [{"title":"...","year":"...","why":"one sentence"}]`;
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": ANTHROPIC_KEY,
          "anthropic-version": "2023-06-01"
        },
        body: JSON.stringify({ model: "claude-opus-4-6", max_tokens: 800, messages: [{ role: "user", content: prompt }] })
      });
      const data = await res.json();
      const text = (data.content||[]).map(b=>b.text||"").join("");
      suggestions = JSON.parse(text.replace(/```json|```/g,"").trim());
    } else {
      // Fallback without API key
      const term = q || (watchHistory.length > 0 ? watchHistory[0].title : "award winning films");
      const found = await omdbSearch(term);
      suggestions = found.slice(0,5).map(m => ({ title: m.Title, year: m.Year, why: null }));
    }

    const details = await Promise.all(suggestions.map(async s => {
      const found = await omdbSearch(`${s.title} ${s.year}`);
      const pick = found[0];
      if (!pick) return { Title: s.title, Year: s.year, Poster: "", imdbID: null, imdbRating: "N/A", why: s.why };
      const d = await omdbDetail(pick.imdbID);
      return { ...d, why: s.why };
    }));

    if (!details.length) {
      el.innerHTML = `<div class="empty"><div class="icon">🤷</div><div class="title">NO PICKS FOUND</div><div class="sub">Try a different prompt</div></div>`;
    } else {
      el.innerHTML = `<div class="card-list">${details.map(m => movieCardHTML(m, m.why)).join("")}</div>`;
    }
  } catch(e) {
    el.innerHTML = `<div class="empty"><div class="title">ERROR</div><div class="sub">${e.message}</div></div>`;
  }

  btn.disabled = false;
  btn.textContent = "FIND";
}

// ── History ───────────────────────────────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById("history-list");
  if (!watchHistory.length) {
    el.innerHTML = `<div class="empty"><div class="icon">📋</div><div class="title">NO HISTORY YET</div><div class="sub">Find a film and mark it as watched</div></div>`;
    return;
  }
  const rated = watchHistory.filter(h => h.stars > 0);
  const avg = rated.length ? (rated.reduce((a,b) => a+b.stars, 0) / rated.length).toFixed(1) + "★" : "—";
  el.innerHTML = `
    <div class="history-header">
      <span>${watchHistory.length} film${watchHistory.length>1?"s":""} watched</span>
      <span>Avg rating: ${avg}</span>
    </div>
    <div class="card-list">
      ${watchHistory.map(item => `
        <div class="hist-card" onclick="${item.imdbID ? `openDetail('${item.imdbID}')` : ''}">
          <div class="hist-poster">${item.poster&&item.poster!=="N/A" ? `<img src="${item.poster}" alt="">` : "🎬"}</div>
          <div style="flex:1;min-width:0">
            <div class="hist-top">
              <div>
                <div class="hist-title">${item.title}</div>
                <div class="hist-meta">${item.year} · ${item.date}</div>
              </div>
              <button class="hist-del" onclick="event.stopPropagation();deleteItem(${item.id})">×</button>
            </div>
            <div style="display:flex;gap:2px;margin-top:3px">${starsHTML(item.stars)}</div>
            ${item.comment ? `<div class="hist-note">"${item.comment}"</div>` : ""}
          </div>
        </div>`).join("")}
    </div>`;
}

function deleteItem(id) {
  watchHistory = watchHistory.filter(h => h.id !== id);
  localStorage.setItem("mn_history", JSON.stringify(watchHistory));
  renderHistory();
}

// Init
document.getElementById("search-results").innerHTML = `
  <div class="empty">
    <div class="icon">🎬</div>
    <div class="title">FIND YOUR NEXT FILM</div>
    <div class="sub">Type a title and press Search or Enter</div>
  </div>`;
document.getElementById("rec-results").innerHTML = `
  <div class="empty">
    <div class="icon">✨</div>
    <div class="title">GET PERSONALISED PICKS</div>
    <div class="sub">Enter a prompt or leave blank and hit Find</div>
  </div>`;

// Register service worker for PWA / offline support
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").catch(err => console.warn("SW:", err));
}
</script>
